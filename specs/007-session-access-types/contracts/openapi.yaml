openapi: 3.1.0
info:
  title: Escalade Session Types and Access Rights Contract
  version: 0.7.0
  description: |
    Contrat HTTP de reference pour la feature 007. Le produit reste rendu cote
    serveur via HTML. Ce contrat documente le calendrier mixte membre, les
    actions d inscription conditionnees par type de seance, l administration des
    droits utilisateur et le parcours d edition occurrence-only pour les profs.
servers:
  - url: https://example.invalid
paths:
  /sessions/:
    get:
      summary: Afficher le calendrier mixte pratiques libres et cours
      operationId: getMixedSessionCalendar
      parameters:
        - in: query
          name: week_start
          description: Premier jour de la semaine a afficher
          schema:
            type: string
            format: date
        - in: query
          name: selected_occurrence
          description: Occurrence detaillee sous le calendrier
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Page HTML du calendrier mixte
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/MixedCalendarPage"

  /bookings/{occurrenceId}/reserve/:
    post:
      summary: S inscrire a une occurrence autorisee
      operationId: reserveOccurrenceWithAccessPolicy
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers le calendrier avec message flash
        "403":
          description: Occurrence visible mais non autorisee pour ce profil
        "409":
          description: Occurrence non reservable car fermee, complete ou deja commencee

  /bookings/{occurrenceId}/cancel/:
    post:
      summary: Annuler sa reservation sur une occurrence
      operationId: cancelOccurrenceBooking
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers le calendrier avec message flash
        "404":
          description: Reservation active introuvable

  /sessions/slots/{slotId}/responsibility/take/:
    post:
      summary: Prendre un creneau responsable sur une pratique libre
      operationId: takeFreePracticeResponsibility
      parameters:
        - $ref: "#/components/parameters/SlotId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers le calendrier avec message flash
        "403":
          description: Utilisateur non accredite ou occurrence non eligible a la couverture
        "409":
          description: Creneau indisponible

  /sessions/slots/{slotId}/responsibility/release/:
    post:
      summary: Abandonner un creneau responsable sur une pratique libre
      operationId: releaseFreePracticeResponsibility
      parameters:
        - $ref: "#/components/parameters/SlotId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers le calendrier avec message flash
        "404":
          description: Couverture active introuvable

  /admin/accounts/:
    get:
      summary: Afficher l administration des comptes et droits d acces
      operationId: getAccountAccessAdmin
      responses:
        "200":
          description: Page HTML d administration des droits utilisateur
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountAccessCard"
        "403":
          description: Admin requis

  /admin/accounts/{userId}/status/:
    post:
      summary: Mettre a jour le profil d acces d un utilisateur
      operationId: updateAccountAccessProfile
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/AccountAccessForm"
      responses:
        "303":
          description: Redirection vers la liste des comptes avec message flash
        "403":
          description: Admin requis

  /admin/sessions/series/new/:
    post:
      summary: Creer une serie de type pratique libre ou cours
      operationId: createSessionSeries
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/AdminSeriesForm"
      responses:
        "303":
          description: Redirection vers la liste admin des seances
        "403":
          description: Admin requis

  /admin/sessions/occurrences/{occurrenceId}/edit/:
    get:
      summary: Ouvrir le formulaire admin d une occurrence
      operationId: getAdminOccurrenceEdit
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "200":
          description: Formulaire admin complet d occurrence
          content:
            text/html:
              schema:
                type: string
        "403":
          description: Admin requis
    post:
      summary: Modifier une occurrence avec les droits admin
      operationId: updateOccurrenceAsAdmin
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/AdminOccurrenceForm"
      responses:
        "303":
          description: Redirection vers la meme occurrence admin
        "403":
          description: Admin requis

  /sessions/teaching/{occurrenceId}/edit/:
    get:
      summary: Ouvrir le formulaire prof d une occurrence de cours
      operationId: getTeacherOccurrenceEdit
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "200":
          description: Formulaire d edition occurrence-only pour le prof assigne
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherOccurrenceForm"
        "403":
          description: Prof non autorise sur cette occurrence
        "404":
          description: Occurrence introuvable ou non de type cours
    post:
      summary: Modifier une occurrence de son propre cours
      operationId: updateOccurrenceAsTeacher
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TeacherOccurrenceForm"
      responses:
        "303":
          description: Redirection vers le calendrier ou la page d edition avec message flash
        "403":
          description: Prof non autorise sur cette occurrence
        "404":
          description: Occurrence introuvable ou non de type cours

components:
  parameters:
    OccurrenceId:
      in: path
      name: occurrenceId
      required: true
      schema:
        type: integer
        minimum: 1
    SlotId:
      in: path
      name: slotId
      required: true
      schema:
        type: integer
        minimum: 1
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    CalendarReturnContext:
      type: object
      properties:
        week_start:
          type: string
          format: date
        selected_occurrence:
          type: integer
          minimum: 1

    MixedCalendarPage:
      type: object
      required:
        - weekStart
        - weekEnd
        - occurrences
      properties:
        weekStart:
          type: string
          format: date
        weekEnd:
          type: string
          format: date
        occurrences:
          type: array
          items:
            $ref: "#/components/schemas/OccurrenceCalendarCard"
        selectedDetail:
          anyOf:
            - $ref: "#/components/schemas/OccurrenceDetail"
            - type: "null"

    OccurrenceCalendarCard:
      type: object
      required:
        - occurrenceId
        - sessionType
        - title
        - date
        - startTime
        - endTime
        - status
      properties:
        occurrenceId:
          type: integer
        sessionType:
          type: string
          enum:
            - free_practice
            - course
        title:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        endTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        status:
          type: string
        isReservable:
          type: boolean
        denialReason:
          type: string
          nullable: true

    OccurrenceDetail:
      type: object
      required:
        - occurrenceId
        - sessionType
        - title
        - actions
      properties:
        occurrenceId:
          type: integer
        sessionType:
          type: string
          enum:
            - free_practice
            - course
        title:
          type: string
        teacherName:
          type: string
          nullable: true
        coverageSummary:
          type: string
          nullable: true
        actions:
          type: array
          items:
            type: string
            enum:
              - reserve
              - cancel
              - take_responsibility
              - release_responsibility
              - edit_as_teacher

    AccountAccessCard:
      type: object
      required:
        - userId
        - fullName
        - role
        - isActive
        - isResponsableAccredited
        - hasOrangePassport
        - courseSeriesIds
      properties:
        userId:
          type: integer
        fullName:
          type: string
        role:
          type: string
          enum:
            - member
            - admin
        isActive:
          type: boolean
        isResponsableAccredited:
          type: boolean
        hasOrangePassport:
          type: boolean
        courseSeriesIds:
          type: array
          items:
            type: integer

    AccountAccessForm:
      type: object
      required:
        - role
        - is_active
        - is_responsable_accredited
        - has_orange_passport
      properties:
        role:
          type: string
          enum:
            - member
            - admin
        is_active:
          type: boolean
        is_responsable_accredited:
          type: boolean
        has_orange_passport:
          type: boolean
        course_series_ids:
          type: array
          items:
            type: integer

    AdminSeriesForm:
      type: object
      required:
        - label
        - session_type
        - weekday
        - start_time
        - end_time
        - default_capacity
      properties:
        label:
          type: string
        session_type:
          type: string
          enum:
            - free_practice
            - course
        weekday:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        end_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        default_capacity:
          type: integer
          minimum: 1
        default_teacher_id:
          type: integer
          nullable: true

    AdminOccurrenceForm:
      type: object
      required:
        - label
        - session_date
        - start_time
        - end_time
        - capacity
        - status
        - session_type
      properties:
        label:
          type: string
        session_date:
          type: string
          format: date
        start_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        end_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        capacity:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
            - draft
            - open
            - closed
            - cancelled
            - completed
        session_type:
          type: string
          enum:
            - free_practice
            - course
        teacher_id:
          type: integer
          nullable: true
        notes:
          type: string

    TeacherOccurrenceForm:
      type: object
      required:
        - label
        - session_date
        - start_time
        - end_time
        - capacity
        - notes
      properties:
        label:
          type: string
        session_date:
          type: string
          format: date
        start_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        end_time:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        capacity:
          type: integer
          minimum: 1
        notes:
          type: string
