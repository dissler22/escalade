openapi: 3.1.0
info:
  title: Escalade Visual Refresh Review Contract
  version: 0.2.0
  description: |
    Contrat HTTP de reference pour la refonte visuelle USMV. Il documente
    les ecrans HTML et assets critiques qui doivent afficher une charte
    coherente sans modifier les comportements metier existants.
servers:
  - url: https://example.invalid
paths:
  /login/:
    get:
      summary: Afficher l'ecran de connexion rafraichi
      operationId: getLoginPage
      x-visual-review:
        pageKind: login
        markers:
          - usmv-branding
          - primary-action-visible
          - flash-message-styled
          - mobile-readable-layout
      responses:
        "200":
          description: Page HTML de connexion avec marque USMV et action principale visible
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

    post:
      summary: Soumettre le formulaire de connexion dans le shell visuel rafraichi
      operationId: submitLogin
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "302":
          description: Redirection vers la liste des seances apres connexion reussie
        "200":
          description: Reaffichage du formulaire avec message d'erreur coheremment stylise
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /sessions/:
    get:
      summary: Afficher la liste des seances dans la nouvelle charte
      operationId: getSessionListPage
      x-visual-review:
        pageKind: member-list
        markers:
          - usmv-branding
          - consistent-navigation
          - status-badge-or-label
          - mobile-readable-layout
      responses:
        "200":
          description: Page HTML listant les seances reservables avec cartes ou blocs coherents
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /sessions/{occurrenceId}/:
    get:
      summary: Afficher le detail d'une seance avec etats visuels explicites
      operationId: getSessionDetailPage
      x-visual-review:
        pageKind: member-detail
        markers:
          - usmv-branding
          - primary-action-visible
          - status-badge-or-label
          - mobile-readable-layout
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "200":
          description: Detail HTML d'une seance avec action principale et statut visibles
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"
        "404":
          description: Seance introuvable

  /bookings/mine/:
    get:
      summary: Afficher les reservations personnelles dans la charte USMV
      operationId: getMyReservationsPage
      x-visual-review:
        pageKind: member-bookings
        markers:
          - usmv-branding
          - consistent-navigation
          - primary-action-visible
          - mobile-readable-layout
      responses:
        "200":
          description: Page HTML des reservations personnelles
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /bookings/{occurrenceId}/reserve/:
    post:
      summary: Reserver une seance depuis l'interface rafraichie
      operationId: reserveOccurrence
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "302":
          description: Redirection vers la page de detail avec message de resultat

  /bookings/{occurrenceId}/cancel/:
    post:
      summary: Annuler une reservation depuis l'interface rafraichie
      operationId: cancelOccurrence
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "302":
          description: Redirection vers la page des reservations avec message de resultat

  /admin/sessions/:
    get:
      summary: Afficher le tableau de bord admin des series et occurrences
      operationId: getAdminSessionsPage
      x-visual-review:
        pageKind: admin-list
        markers:
          - usmv-branding
          - consistent-navigation
          - admin-dense-layout-readable
          - responsive-table
      responses:
        "200":
          description: Page HTML admin avec listes denses lisibles et actions evidentes
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /admin/sessions/series/new/:
    get:
      summary: Afficher le formulaire de creation de serie avec composants partages
      operationId: getAdminSeriesCreatePage
      x-visual-review:
        pageKind: admin-form
        markers:
          - usmv-branding
          - primary-action-visible
          - mobile-readable-layout
      responses:
        "200":
          description: Formulaire HTML admin dans la charte commune
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /admin/sessions/occurrences/new/:
    get:
      summary: Afficher le formulaire de creation d'occurrence avec hierarchie claire
      operationId: getAdminOccurrenceCreatePage
      x-visual-review:
        pageKind: admin-form
        markers:
          - usmv-branding
          - primary-action-visible
          - mobile-readable-layout
      responses:
        "200":
          description: Formulaire HTML admin avec messages, boutons et champs harmonises
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /admin/bookings/sessions/{occurrenceId}/:
    get:
      summary: Afficher les reservations d'une seance cote admin
      operationId: getAdminSessionReservationsPage
      x-visual-review:
        pageKind: admin-list
        markers:
          - usmv-branding
          - admin-dense-layout-readable
          - responsive-table
          - primary-action-visible
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "200":
          description: Page HTML admin listant membres et reservations avec lisibilite preservee
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /admin/accounts/:
    get:
      summary: Afficher la liste des comptes dans la charte commune
      operationId: getAdminAccountsPage
      x-visual-review:
        pageKind: admin-list
        markers:
          - usmv-branding
          - admin-dense-layout-readable
          - responsive-table
          - status-badge-or-label
      responses:
        "200":
          description: Page HTML admin des comptes avec tableaux et badges coherents
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /admin/audit/sessions/{occurrenceId}/:
    get:
      summary: Afficher l'historique d'audit d'une seance
      operationId: getAdminAuditPage
      x-visual-review:
        pageKind: admin-audit
        markers:
          - usmv-branding
          - admin-dense-layout-readable
          - status-badge-or-label
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "200":
          description: Page HTML d'audit avec chronologie et etats lisibles
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/HtmlPage"

  /static/css/app.css:
    get:
      summary: Recuperer la feuille de style applicative
      operationId: getAppStylesheet
      x-visual-review:
        tokenGroups:
          - brand-colors
          - navigation-shell
          - form-controls
          - responsive-table
          - timeline
      responses:
        "200":
          description: Feuille CSS contenant les tokens et composants visuels partages
          content:
            text/css:
              schema:
                type: string

components:
  parameters:
    OccurrenceId:
      name: occurrenceId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    HtmlPage:
      type: object
      description: Representation abstraite d'une page HTML revue dans le cadre de la refonte
      required: [pageKind, visualMarkers]
      properties:
        pageKind:
          type: string
          enum:
            - login
            - member-list
            - member-detail
            - member-bookings
            - admin-list
            - admin-form
            - admin-audit
        visualMarkers:
          type: array
          minItems: 3
          items:
            type: string
            enum:
              - usmv-branding
              - primary-action-visible
              - consistent-navigation
              - status-badge-or-label
              - flash-message-styled
              - mobile-readable-layout
              - admin-dense-layout-readable
              - responsive-table
