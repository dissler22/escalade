openapi: 3.1.0
info:
  title: Escalade Weekly Session Calendar Contract
  version: 0.6.0
  description: |
    Contrat HTTP de reference pour la vue calendaire hebdomadaire des seances.
    Le produit reste rendu cote serveur via HTML. Ce contrat decrit la page
    principale membre, sa navigation de semaine, le detail inline de la seance
    selectionnee et les actions POST deja autorisees depuis cette meme page.
servers:
  - url: https://example.invalid
paths:
  /sessions/:
    get:
      summary: Afficher la semaine de seances avec detail inline
      operationId: getWeeklySessionCalendar
      parameters:
        - in: query
          name: week_start
          description: Premier jour de la semaine a afficher
          schema:
            type: string
            format: date
        - in: query
          name: selected_occurrence
          description: Identifiant de la seance a detailler sous la grille
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Page HTML de calendrier hebdomadaire et detail inline
          content:
            text/html:
              schema:
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyCalendarPage"

  /sessions/{occurrenceId}/:
    get:
      summary: Ouvrir une seance par compatibilite avec redirection vers la vue semaine
      operationId: getSessionCompatibilityEntry
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      responses:
        "302":
          description: Redirection vers /sessions/ avec semaine, seance selectionnee et ancre de detail inline
        "200":
          description: Rendu de secours si la compatibilite est implementee sans redirection
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Seance introuvable

  /bookings/{occurrenceId}/reserve/:
    post:
      summary: Reserver la seance selectionnee depuis le detail inline
      operationId: reserveOccurrenceFromCalendar
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers la meme vue semaine et le detail inline avec message flash
        "409":
          description: Seance non reservable ou deja reservee

  /bookings/{occurrenceId}/cancel/:
    post:
      summary: Annuler sa reservation depuis le detail inline
      operationId: cancelOccurrenceFromCalendar
      parameters:
        - $ref: "#/components/parameters/OccurrenceId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers la meme vue semaine et le detail inline avec message flash
        "404":
          description: Reservation active introuvable

  /sessions/slots/{slotId}/responsibility/take/:
    post:
      summary: Prendre un creneau responsable depuis le detail inline
      operationId: takeSlotResponsibilityFromCalendar
      parameters:
        - $ref: "#/components/parameters/SlotId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers la meme vue semaine et le detail inline avec message flash
        "403":
          description: Utilisateur non accredite ou action non autorisee
        "409":
          description: Creneau deja couvert, annule ou commence

  /sessions/slots/{slotId}/responsibility/release/:
    post:
      summary: Abandonner un creneau responsable depuis le detail inline
      operationId: releaseSlotResponsibilityFromCalendar
      parameters:
        - $ref: "#/components/parameters/SlotId"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CalendarReturnContext"
      responses:
        "303":
          description: Redirection vers la meme vue semaine et le detail inline avec message flash
        "404":
          description: Responsabilite active introuvable

components:
  parameters:
    OccurrenceId:
      in: path
      name: occurrenceId
      required: true
      schema:
        type: integer
        minimum: 1
    SlotId:
      in: path
      name: slotId
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    CalendarReturnContext:
      type: object
      properties:
        week_start:
          type: string
          format: date
        selected_occurrence:
          type: integer
          minimum: 1

    WeeklyCalendarPage:
      type: object
      required:
        - week
        - days
      properties:
        week:
          $ref: "#/components/schemas/CalendarWeek"
        days:
          type: array
          minItems: 7
          maxItems: 7
          items:
            $ref: "#/components/schemas/CalendarDay"
        selectedDetail:
          anyOf:
            - $ref: "#/components/schemas/InlineOccurrenceDetail"
            - type: "null"
        emptyStateMessage:
          type: string

    CalendarWeek:
      type: object
      required:
        - weekStart
        - weekEnd
        - visibleStartTime
        - visibleEndTime
        - previousWeekStart
        - nextWeekStart
      properties:
        weekStart:
          type: string
          format: date
        weekEnd:
          type: string
          format: date
        visibleStartTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        visibleEndTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        previousWeekStart:
          type: string
          format: date
        nextWeekStart:
          type: string
          format: date
        selectedOccurrence:
          type: integer
          nullable: true

    CalendarDay:
      type: object
      required:
        - date
        - labelShort
        - labelFull
        - occurrenceBlocks
      properties:
        date:
          type: string
          format: date
        labelShort:
          type: string
        labelFull:
          type: string
        occurrenceBlocks:
          type: array
          items:
            $ref: "#/components/schemas/CalendarOccurrenceBlock"

    CalendarOccurrenceBlock:
      type: object
      required:
        - occurrenceId
        - displayLabelShort
        - startTime
        - endTime
        - layoutStartMinutes
        - layoutDurationMinutes
        - isSelected
        - statusLabel
      properties:
        occurrenceId:
          type: integer
        displayLabelShort:
          type: string
        statusLabel:
          type: string
        startTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        endTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
        startsBeforeVisibleRange:
          type: boolean
        endsAfterVisibleRange:
          type: boolean
        layoutStartMinutes:
          type: integer
          minimum: 0
        layoutDurationMinutes:
          type: integer
          minimum: 1
        isSelected:
          type: boolean
        isBookable:
          type: boolean
        remainingCapacity:
          type: integer
          minimum: 0
        coveredSlots:
          type: integer
          minimum: 0
        totalSlots:
          type: integer
          minimum: 0

    InlineOccurrenceDetail:
      type: object
      required:
        - occurrenceId
        - title
        - dateLabel
        - timeLabel
        - statusLabel
        - actions
        - slotCards
      properties:
        occurrenceId:
          type: integer
        title:
          type: string
        dateLabel:
          type: string
        timeLabel:
          type: string
        statusLabel:
          type: string
        remainingCapacityLabel:
          type: string
        coverageSummaryLabel:
          type: string
        notes:
          type: string
        hasMyReservation:
          type: boolean
        actions:
          type: array
          items:
            type: string
            enum:
              - reserve
              - cancel
              - view_reservations
        slotCards:
          type: array
          items:
            $ref: "#/components/schemas/InlineSlotCard"

    InlineSlotCard:
      type: object
      required:
        - slotId
        - timeLabel
        - coverageStatus
        - actionState
      properties:
        slotId:
          type: integer
        timeLabel:
          type: string
        coverageStatus:
          type: string
          enum:
            - uncovered
            - covered
            - cancelled
        currentResponsableName:
          type: string
          nullable: true
        actionState:
          type: string
          enum:
            - none
            - take
            - release
