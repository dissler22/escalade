{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <section class="stack-lg">
    <section class="card form-card">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Série hebdomadaire</p>
          <h2>Paramétrage</h2>
        </div>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="form-body">{{ form.as_p }}</div>
        <div class="actions">
          <button type="submit">Enregistrer</button>
          <a class="button secondary" href="{% url 'sessions_admin:series-list' %}">Retour au pilotage</a>
        </div>
      </form>
      {% if series %}
        <form method="post" action="{% url 'sessions_admin:series-delete' series_id=series.id %}">
          {% csrf_token %}
          <button type="submit" class="danger">Supprimer cette série</button>
        </form>
      {% endif %}
    </section>
  </section>
{% endblock %}
