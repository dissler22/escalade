{% extends "base.html" %}

{% block content %}
  <section class="card">
    <h1>Comptes</h1>
    <table class="table">
      <thead>
        <tr><th>Nom</th><th>Email</th><th>Role</th><th>Actif</th><th></th></tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user.full_name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.is_active|yesno:"oui,non" }}</td>
            <td>
              <form method="post" action="{% url 'accounts_admin:account-status' user_id=user.id %}" class="inline-form">
                {% csrf_token %}
                <select name="role">
                  <option value="member" {% if user.role == "member" %}selected{% endif %}>member</option>
                  <option value="admin" {% if user.role == "admin" %}selected{% endif %}>admin</option>
                </select>
                <select name="is_active">
                  <option value="true" {% if user.is_active %}selected{% endif %}>actif</option>
                  <option value="false" {% if not user.is_active %}selected{% endif %}>inactif</option>
                </select>
                <button type="submit" class="secondary">Mettre a jour</button>
              </form>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
{% endblock %}
