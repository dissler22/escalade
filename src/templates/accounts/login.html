{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
  <section class="stack-lg">
    <section class="card form-card">
      <div class="section-heading">
        <div>
          <p class="section-kicker">Connexion</p>
          <h2>Accès personnel</h2>
        </div>
      </div>
      <p class="section-note">
        Site de réservation pour la salle d'escalade de Viroflay. Bienvenue.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="form-body">{{ form.as_p }}</div>
        <button type="submit">Se connecter</button>
      </form>
    </section>
  </section>
{% endblock %}
